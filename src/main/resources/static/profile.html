<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Linkly</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 4rem auto;
            text-align: center;
        }
        .profile-name {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .profile-username {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }
        .profile-bio {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 3rem;
            color: var(--text-primary);
        }
        #profileContent {
            display: none;
        }
        .spinner {
            margin: 4rem auto;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container profile-container">
        
        <div id="loading" class="spinner"></div>

        <div id="error" class="glass-card hidden text-center" style="border-color: var(--danger-color);">
            <h2 class="mb-2">User Not Found</h2>
            <p>The profile you are looking for does not exist.</p>
            <a href="/" class="btn btn-primary mt-4">Go Home</a>
        </div>

        <div id="profileContent">
            <h1 class="profile-name" id="pubName"></h1>
            <div class="profile-username">@<span id="pubUsername"></span></div>
            <p class="profile-bio" id="pubBio"></p>

            <div class="link-list" id="pubLinks">
                <!-- Links will be injected here -->
            </div>
            
            <div class="mt-4" style="margin-top: 4rem; opacity: 0.5;">
                <a href="/" style="color: var(--text-secondary); font-size: 0.9rem;">Powered by <strong>Linkly</strong></a>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        async function loadProfile() {
            const params = new URLSearchParams(window.location.search);
            const username = params.get('u');
            
            if (!username) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
                return;
            }

            try {
                // Using standard fetch without JWT for public endpoint
                const response = await fetch(`/api/public/u/${username}`);
                
                if (!response.ok) {
                    throw new Error('User not found');
                }
                
                const profile = await response.json();
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('profileContent').style.display = 'block';
                
                document.getElementById('pubName').textContent = profile.name;
                document.getElementById('pubUsername').textContent = profile.username;
                
                if (profile.bio) {
                    document.getElementById('pubBio').textContent = profile.bio;
                } else {
                    document.getElementById('pubBio').style.display = 'none';
                }

                const linksContainer = document.getElementById('pubLinks');
                if (profile.links && profile.links.length > 0) {
                    linksContainer.innerHTML = profile.links.map(link => `
                        <a href="/r/${link.shortUrl}" target="_blank" rel="noopener noreferrer" class="public-link">
                            ${link.title}
                        </a>
                    `).join('');
                } else {
                    linksContainer.innerHTML = `<p style="color: var(--text-secondary);">No links added yet.</p>`;
                }
                
                document.title = `${profile.name} (@${profile.username}) | Linkly`;

            } catch (error) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
            }
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
