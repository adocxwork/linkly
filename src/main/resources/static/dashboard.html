<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Linkly</title>
    <link rel="stylesheet" href="/css/style.css">
    <script>
        // Protect Route
        if (!localStorage.getItem('token')) {
            window.location.href = '/';
        }
    </script>
</head>
<body>

    <nav class="navbar">
        <div class="brand">Link<span>ly</span></div>
        <div class="nav-links">
            <a href="#" id="viewProfileBtn" target="_blank" style="color: var(--text-primary);">View Profile</a>
            <button id="logoutBtn" class="btn btn-danger" style="padding: 0.5rem 1rem;">Log Out</button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="dashboard-stats">
            <div class="glass-card stat-card">
                <h4>Total Links</h4>
                <div class="value" id="totalLinks">0</div>
            </div>
            <div class="glass-card stat-card">
                <h4>Total Clicks</h4>
                <div class="value" id="totalClicks">0</div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem;">
            
            <!-- Profile Settings -->
            <div class="glass-card" style="align-self: start;">
                <h3 class="mb-3">Profile Settings</h3>
                <form id="profileForm">
                    <div class="form-group">
                        <label for="profileName">Name</label>
                        <input type="text" id="profileName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="profileBio">Bio</label>
                        <textarea id="profileBio" class="form-control" rows="3" placeholder="Tell the world about yourself..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Save Profile</button>
                </form>
            </div>

            <!-- Link Management -->
            <div class="glass-card">
                <div style="display: flex; justify-content: space-between; align-items: center;" class="mb-3">
                    <h3>Your Links</h3>
                </div>

                <form id="addLinkForm" class="mb-4" style="background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--glass-border);">
                    <h4 class="mb-2">Add New Link</h4>
                    <div class="form-group">
                        <input type="text" id="linkTitle" class="form-control" placeholder="Title (e.g. My GitHub)" required>
                    </div>
                    <div class="form-group mb-3">
                        <input type="url" id="linkUrl" class="form-control" placeholder="URL (e.g. https://github.com/john)" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Link</button>
                </form>

                <div class="link-list" id="linksContainer">
                    <!-- Links will be injected here via JS -->
                </div>
            </div>

        </div>
    </div>

    <div id="toast"></div>

    <script src="/js/app.js"></script>
    <script>
        let currentUser = null;

        async function initDashboard() {
            try {
                // 1. Fetch Profile
                currentUser = await apiCall('/users/profile');
                document.getElementById('profileName').value = currentUser.name;
                document.getElementById('profileBio').value = currentUser.bio || '';
                
                // Set public profile link
                document.getElementById('viewProfileBtn').href = `/profile.html?u=${currentUser.username}`;

                // 2. Fetch Dashboard Stats
                const stats = await apiCall('/links/dashboard');
                document.getElementById('totalLinks').textContent = stats.totalLinks;
                document.getElementById('totalClicks').textContent = stats.totalClicks;

                // 3. Fetch Links
                loadLinks();
            } catch (err) {
                console.error('Failed to load dashboard', err);
            }
        }

        async function loadLinks() {
            try {
                const links = await apiCall('/links');
                const container = document.getElementById('linksContainer');
                
                if (links.length === 0) {
                    container.innerHTML = `<p style="color: var(--text-secondary); text-align: center; padding: 2rem;">No links added yet.</p>`;
                    return;
                }

                container.innerHTML = links.map(link => `
                    <div class="link-item" style="${!link.active ? 'opacity: 0.5;' : ''}">
                        <div class="link-info">
                            <h3>${link.title}</h3>
                            <a href="${link.originalUrl}" target="_blank" rel="noopener noreferrer">${link.originalUrl}</a>
                            <a href="/r/${link.shortUrl}" target="_blank" class="short-url">${window.location.origin}/r/${link.shortUrl}</a>
                            <small style="color: var(--text-secondary); margin-top: 5px; display: block;">Clicks: ${link.clickCount}</small>
                        </div>
                        <div class="link-actions">
                            <button onclick="toggleActive('${link.id}', ${!link.active}, '${link.title}', '${link.originalUrl}')" class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.85rem; background: ${link.active ? 'var(--text-secondary)' : 'var(--success-color)'};">
                                ${link.active ? 'Disable' : 'Enable'}
                            </button>
                            <button onclick="deleteLink('${link.id}')" class="btn btn-danger" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Failed to load links', err);
            }
        }

        // Handle Profile Update
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('profileName').value;
            const bio = document.getElementById('profileBio').value;

            try {
                await apiCall('/users/profile', 'PUT', { name, bio });
                showToast('Profile updated successfully');
            } catch (err) {}
        });

        // Handle Add Link
        document.getElementById('addLinkForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('linkTitle').value;
            const originalUrl = document.getElementById('linkUrl').value;

            try {
                await apiCall('/links', 'POST', { title, originalUrl, active: true });
                showToast('Link added successfully');
                document.getElementById('linkTitle').value = '';
                document.getElementById('linkUrl').value = '';
                initDashboard(); // Refresh all stats & lists
            } catch (err) {}
        });

        // Handle Delete Link
        window.deleteLink = async function(id) {
            if(!confirm('Are you sure you want to delete this link?')) return;
            try {
                await apiCall(`/links/${id}`, 'DELETE');
                showToast('Link deleted');
                initDashboard();
            } catch (err) {}
        };

        // Handle Toggle Active
        window.toggleActive = async function(id, active, title, originalUrl) {
            try {
                await apiCall(`/links/${id}`, 'PUT', { title, originalUrl, active });
                showToast(active ? 'Link enabled' : 'Link disabled');
                initDashboard();
            } catch (err) {}
        };

        // Initialize on load
        initDashboard();
    </script>
</body>
</html>
