<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkly - Your Links, One Place</title>
    <link rel="stylesheet" href="/css/style.css">
    <script>
        // If already logged in, redirect to dashboard
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard.html';
        }
    </script>
</head>
<body>

    <nav class="navbar">
        <div class="brand">Link<span>ly</span></div>
    </nav>

    <div class="container text-center mt-4">
        <h1 class="mb-2" style="font-size: 3rem;">One Link for <span style="color: var(--accent-color);">Everything</span>.</h1>
        <p class="mb-4" style="color: var(--text-secondary); font-size: 1.2rem;">
            Claim your link in bio. Share your content with the world through a beautiful, customizable profile.
        </p>

        <div style="max-width: 400px; margin: 0 auto;">
            <!-- Login Section -->
            <div id="loginSection" class="glass-card">
                <h2 class="mb-3">Welcome Back</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginIdentifier">Username or Email</label>
                        <input type="text" id="loginIdentifier" class="form-control" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" class="form-control" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Log In</button>
                </form>
                <p class="mt-4" style="font-size: 0.9rem;">
                    Don't have an account? <a href="#" onclick="toggleAuthMode(); return false;">Sign up here</a>.
                </p>
            </div>

            <!-- Register Section -->
            <div id="registerSection" class="glass-card hidden">
                <h2 class="mb-3">Create an Account</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="regName">Name</label>
                        <input type="text" id="regName" class="form-control" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="regUsername">Username</label>
                        <input type="text" id="regUsername" class="form-control" required minlength="3" placeholder="johndoe">
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" class="form-control" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" class="form-control" required minlength="6" placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
                </form>
                <p class="mt-4" style="font-size: 0.9rem;">
                    Already have an account? <a href="#" onclick="toggleAuthMode(); return false;">Log in here</a>.
                </p>
            </div>
        </div>
    </div>

    <div id="toast"></div>
    <script src="/js/app.js"></script>
</body>
</html>
